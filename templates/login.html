<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bot Ministro — Acceso</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-box {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 12px;
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
    }
    .login-brand {
      text-align: center;
      margin-bottom: 28px;
    }
    .login-brand .icon { font-size: 42px; margin-bottom: 8px; }
    .login-brand h1 { font-size: 20px; font-weight: 700; color: #fff; }
    .login-brand p { font-size: 13px; color: #8b949e; margin-top: 4px; }

    .alert {
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 16px;
      border-left: 3px solid #f85149;
      background: #2b0e16;
      color: #f85149;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    input[type=password] {
      width: 100%;
      background: #0d1117;
      border: 1px solid #21262d;
      border-radius: 6px;
      color: #c9d1d9;
      padding: 10px 14px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 20px;
    }
    input[type=password]:focus { border-color: #e94560; }

    button {
      width: 100%;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 11px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: filter 0.15s;
    }
    button:hover { filter: brightness(1.1); }

    .login-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: #8b949e;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="login-brand">
      <img src="/static/avatar.jpg" alt="UnknownRD"
           style="width:80px;height:80px;border-radius:50%;object-fit:cover;object-position:center top;border:2px solid #21262d;margin-bottom:12px;display:block;margin-left:auto;margin-right:auto;">
      <h1>Bot Ministro</h1>
      <p>Panel de Administración</p>
    </div>

    {% for category, message in get_flashed_messages(with_categories=True) %}
      <div class="alert">{{ message }}</div>
    {% endfor %}

    <form method="POST">
      <label>Contraseña</label>
      <input type="password" name="password" placeholder="••••••••" autofocus required>
      <button type="submit">Entrar al panel</button>
    </form>

    <div class="login-footer">🇩🇴 Bot Dominicano v2.0</div>

    <div style="margin-top:20px;padding-top:16px;border-top:1px solid #21262d;text-align:center;font-size:12px;color:#8b949e;">
      Creado con ❤️ por
      <a href="https://github.com/UnknownRD" target="_blank"
         style="color:#4fc3f7;text-decoration:none;font-weight:700;">@UnknownRD</a>
    </div>
  </div>
</body>
</html>
