services:
  - type: web
    name: ministro-bot
    env: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: DISCORD_TOKEN
        sync: false
      - key: KLIPY_API_KEY
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: PORT
        value: "10000"
